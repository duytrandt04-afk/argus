# GoReleaser OSS v2 configuration
# Docs: https://goreleaser.com
version: 2

before:
  hooks:
    # Build frontend first — the Go binary embeds frontend/dist/* via //go:embed in
    # backend/internal/ui/ui.go. GoReleaser's own dist/ output is a different directory.
    - bash -c "cd frontend && pnpm install --frozen-lockfile && pnpm run build"
    - bash -c "rm -rf backend/internal/ui/dist && mkdir -p backend/internal/ui && cp -R frontend/dist backend/internal/ui/dist"

builds:
  - id: argus
    main: ./cmd/server
    dir: backend
    binary: argus
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      # Package path matches module: argus/internal/version (NOT main.version)
      - -X argus/internal/version.Version={{.Version}}
      - -X argus/internal/version.Commit={{.Commit}}
      - -X argus/internal/version.BuildDate={{.Date}}

archives:
  - id: default
    name_template: "argus_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    formats: [tar.gz]

checksum:
  name_template: "checksums.txt"

changelog:
  disable: true

release:
  header: |
    ## Argus v0.1.2 — CPU optimization

    A performance pass across the whole app. Argus runs locally alongside your coding agents, so this release cuts both per-event ingest spikes and the CPU it burns while just sitting open in a tab. No behavior changes, no schema breaks — same features, less work.

    ### Backend

    - **Single-read hook enrichment** — context lookup reads each edited file once instead of twice (≈45% faster on the ingest path); files over 2 MB are skipped.
    - **Marshal-once SSE broadcast** — each event is serialized one time per broadcast, not once per connected browser.
    - **Throttled usage scans** — transcript token-usage is recomputed at most once every 30s per session (always exact on session end) instead of on every hook event, and never on dashboard/session list reads.
    - **Dashboard stats cache** — aggregate stats are cached for 5s; repeat loads drop from tens of milliseconds to microseconds.
    - **Index-friendly queries** — time-range filters now use the `created_at` index directly; `created_at` is normalized to UTC at write (migration 014 backfills existing rows).
    - **Faster project merge** — the projects view collapses nested directories in a single pass instead of a quadratic scan.

    ### Frontend

    - **Isolated header clock** — the per-second time display no longer re-renders the whole app shell.
    - **Visibility-aware polling** — sessions, projects, and the clock stop polling when the tab is hidden and refresh instantly on return.
    - **Cheaper event feed** — cached timestamp formatting and search-highlight regex, append-only filtering for live events, and split session grouping/sorting so toggling sort order doesn't rebuild the tree.
    - **Dashboard render skips** — identical stats payloads keep their object identity and the charts are memoized, so polling no longer redraws unchanged charts.

    ### Upgrade notes

    Migration 014 runs automatically on first start and rewrites any legacy `hook_events.created_at` values to UTC. No action required.

    ### Install

    Download the binary for your platform from the assets below, or install from source:

    ```bash
    git clone https://github.com/duytrandt04-afk/argus
    cd argus && make install
    ```
